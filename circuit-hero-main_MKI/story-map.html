<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story Map — Circuit Hero</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/story-map.css">
</head>
<body>
  <div class="page-wrapper page-bg-gradient">
    <div class="page-content" style="padding: 0 300px;">

      <!-- Header -->
      <header class="site-header">
        <a href="index.html" class="header-left">
          <div class="logo-icon">
            <img src="assets/icons/logo-lightning.svg" alt="Circuit Hero logo" width="20" height="20">
          </div>
          <div class="logo-text">
            <span class="logo-title">Circuit Hero</span>
            <span class="logo-subtitle">QHE6102 . TEAM J</span>
          </div>
        </a>
        <div class="header-right">
          <div class="header-actions">
            <span class="user-greeting" id="userGreeting"></span>
          </div>
        </div>
      </header>

      <div class="divider"></div>

      <!-- Map Stage -->
      <div class="map-stage">
        <div class="map-bg">
          <!-- Chapter Path -->
          <svg class="map-path" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid meet">
            <!-- Path connecting chapters in S-curve -->
            <path d="M200 100 C300 100 350 200 400 200 C450 200 500 300 600 300 C700 300 750 200 800 200 C850 200 900 400 1000 400 C1050 400 1050 500 1000 500" fill="none" stroke="#BCAE96" stroke-width="8" stroke-linecap="round" stroke-dasharray="0" id="mapPathBg"/>
            <path d="M200 100 C300 100 350 200 400 200 C450 200 500 300 600 300 C700 300 750 200 800 200 C850 200 900 400 1000 400 C1050 400 1050 500 1000 500" fill="none" stroke="#FFD700" stroke-width="8" stroke-linecap="round" id="mapPathGold" stroke-dasharray="600" stroke-dashoffset="600"/>
          </svg>

          <!-- Chapter Nodes -->
          <div class="chapter-node completed" data-chapter="1" style="left: 12%; top: 8%;">
            <div class="node-content">
              <div class="node-badge pixel-label">CH.01</div>
              <div class="node-title">Basic Circuits</div>
              <div class="node-stars">
                <span class="star-filled">&#9733;</span><span class="star-filled">&#9733;</span><span class="star-filled">&#9733;</span>
              </div>
            </div>
          </div>

          <div class="chapter-node current" data-chapter="2" style="left: 30%; top: 25%;">
            <div class="node-you">YOU</div>
            <div class="node-marker"></div>
            <div class="node-content">
              <div class="node-badge pixel-label">CH.02</div>
              <div class="node-title">Switches</div>
              <div class="node-stars">
                <span class="star-filled">&#9733;</span><span class="star-empty">&#9733;</span><span class="star-empty">&#9733;</span>
              </div>
            </div>
          </div>

          <div class="chapter-node unlocked" data-chapter="3" style="left: 48%; top: 42%;">
            <div class="node-content">
              <div class="node-badge pixel-label">CH.03</div>
              <div class="node-title">Series</div>
            </div>
          </div>

          <div class="chapter-node locked" data-chapter="4" style="left: 63%; top: 22%;">
            <div class="node-content">
              <div class="node-badge pixel-label">CH.04</div>
              <div class="node-title">Parallel</div>
              <div class="node-lock">
                <img src="assets/icons/lock.svg" alt="Locked" width="18" height="18">
              </div>
            </div>
          </div>

          <div class="chapter-node locked" data-chapter="5" style="left: 80%; top: 55%;">
            <div class="node-content">
              <div class="node-badge pixel-label">CH.05</div>
              <div class="node-title">Mixed</div>
              <div class="node-lock">
                <img src="assets/icons/lock.svg" alt="Locked" width="18" height="18">
              </div>
            </div>
          </div>

          <div class="chapter-node locked" data-chapter="6" style="left: 78%; top: 78%;">
            <div class="node-content">
              <div class="node-badge pixel-label">CH.06</div>
              <div class="node-title">Challenge</div>
              <div class="node-lock">
                <img src="assets/icons/lock.svg" alt="Locked" width="18" height="18">
              </div>
            </div>
          </div>

          <!-- Floating tip -->
          <div class="map-tip">
            <div class="map-tip-content terminal-text">
              Click a chapter to start your adventure! Completed chapters glow gold.
            </div>
          </div>
        </div>
      </div>

      <!-- Bottom Tab Bar -->
      <div class="tab-bar">
        <div class="tab-item active">
          <img src="assets/icons/tab-map.svg" alt="" width="18" height="18">
          Story Map
        </div>
        <div class="tab-item">
          <img src="assets/icons/tab-sandbox.svg" alt="" width="18" height="18">
          Sandbox
        </div>
        <div class="tab-item">
          <img src="assets/icons/tab-profile.svg" alt="" width="18" height="18">
          My Profile
        </div>
      </div>

    </div>
  </div>
  <script src="js/pages/story-map.js"></script>
</body>
</html>
